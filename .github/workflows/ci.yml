name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://agora:agora@localhost:5432/agora
      APP_ENV: test
      JWT_SECRET: ci-test-secret-0123456789abcdef0123456789abcdef
      SUPER_ADMIN_EMAIL: admin-test@example.com
      AUTH_REGISTER_ATTEMPTS: 10000

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora
          POSTGRES_DB: agora
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U agora"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://agora:agora@localhost:5432/agora
          APP_ENV: test
          JWT_SECRET: ci-test-secret-0123456789abcdef0123456789abcdef
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate upgrade package
        run: |
          bash -n deploy.sh scripts/upgrade.sh
          docker compose config --quiet

      - name: Build backend image
        run: docker build -t agora-backend ./backend

      - name: Build frontend image
        run: docker build -t agora-frontend ./frontend
