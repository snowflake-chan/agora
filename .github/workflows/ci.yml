name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora
          POSTGRES_DB: agora
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U agora"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run migrations
        run: |
          cd backend
          DATABASE_URL=postgresql+asyncpg://agora:agora@localhost:5432/agora \
          JWT_SECRET=test-secret \
          REDIS_URL=redis://localhost:6379/0 \
          alembic upgrade head

      - name: Start server & run tests
        run: |
          cd backend
          DATABASE_URL=postgresql+asyncpg://agora:agora@localhost:5432/agora \
          JWT_SECRET=test-secret \
          REDIS_URL=redis://localhost:6379/0 \
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 2
          python -m pytest tests/ -v --tb=short
          kill %1 || true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t agora-backend ./backend

      - name: Build frontend image
        run: docker build -t agora-frontend ./frontend
