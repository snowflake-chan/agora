services:
  redis:
    image: redis:7-alpine
    # No ports or volumes — internal access only, volatile Pub/Sub + counters

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agora
      POSTGRES_PASSWORD: agora
      POSTGRES_DB: agora
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://agora:agora@postgres:5432/agora
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      CORS_ORIGIN: ""
      DEPLOY_ENABLED: ${DEPLOY_ENABLED:-true}
      REPO_DIR: /repo
      REDIS_URL: redis://redis:6379/0
      AUTH_LOGIN_ATTEMPTS: ${AUTH_LOGIN_ATTEMPTS:-10}
      AUTH_LOGIN_WINDOW_SECONDS: ${AUTH_LOGIN_WINDOW_SECONDS:-300}
      AUTH_REGISTER_ATTEMPTS: ${AUTH_REGISTER_ATTEMPTS:-30}
      AUTH_REGISTER_WINDOW_SECONDS: ${AUTH_REGISTER_WINDOW_SECONDS:-3600}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # HOST_REPO_DIR is discovered automatically by deploy.sh when it runs
      # inside Docker. On the initial host invocation, "." remains the default.
      - ${HOST_REPO_DIR:-.}:/repo
    # No ports exposed — accessed via nginx

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      PUBLIC_API_URL: /api/v1
      HOST: 0.0.0.0
    # No ports exposed — accessed via nginx

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ${HOST_REPO_DIR:-.}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
