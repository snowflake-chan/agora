<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--background);color:var(--foreground);font:13px/1.35 var(--font-sans)}.r{display:flex;gap:8px;align-items:stretch;flex-wrap:wrap;margin:0 0 8px}.l{width:100%;font:700 10px/1 var(--font-mono);letter-spacing:.12em;text-transform:uppercase;color:var(--muted-foreground)}.d{margin:8px 0;border:0;border-top:1px solid var(--border)}.c{width:228px;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:10px;display:grid;gap:8px}.x{background:var(--muted);color:var(--muted-foreground);box-shadow:none}.h{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary),var(--shadow-md)}.t{display:flex;justify-content:space-between;gap:8px}.m b{display:block;font-size:18px;line-height:1.1}.m span,.p,.g{font-size:11px;color:var(--muted-foreground)}.p{padding:3px 6px;border-radius:999px;background:var(--accent);color:var(--accent-foreground)}.x .p{background:var(--background);color:var(--muted-foreground)}.b{height:96px;display:flex;align-items:flex-end;gap:6px}.b i{flex:1;border-radius:var(--radius);background:var(--chart-1)}.b i:nth-child(2){background:var(--chart-2)}.b i:nth-child(3){background:var(--chart-3)}.b i:nth-child(4){background:var(--chart-4)}.b i:nth-child(5){background:var(--chart-5)}.q1{height:56%}.q2{height:74%}.q3{height:48%}.q4{height:84%}.q5{height:66%}svg{width:100%;height:96px;display:block}.g{display:flex;justify-content:space-between;gap:8px}.o{display:flex;align-items:center;gap:10px}.n{width:88px;height:88px;border-radius:50%;background:conic-gradient(var(--chart-1) 0 44%,var(--chart-5) 44% 72%,var(--chart-3) 72% 100%);position:relative;flex:none}.n:after{content:"";position:absolute;inset:18px;border-radius:50%;background:var(--card)}.k{display:grid;gap:6px}.y{display:flex;justify-content:space-between;gap:12px;font-size:12px}.w{width:8px;height:8px;border-radius:999px;display:inline-block;margin-right:6px;vertical-align:1px}.s1{background:var(--chart-1)}.s2{background:var(--chart-5)}.s3{background:var(--chart-3)}</style>
</head>
<body>
<div class="r"><span class="l">Bar / default</span><article class="c"><div class="t"><div class="m"><span>Weekly trend</span><b>1.82M</b></div><span class="p">Ahead</span></div><div class="b"><i class="q1"></i><i class="q2"></i><i class="q3"></i><i class="q4"></i><i class="q5"></i></div><div class="g"><span>Mon-Fri sessions</span><span>+12.4%</span></div></article><article class="c x" aria-disabled="true"><div class="t"><div class="m"><span>Weekly trend</span><b>Data paused</b></div><span class="p">Off</span></div><div class="b"><i class="q1"></i><i class="q2"></i><i class="q3"></i><i class="q4"></i><i class="q5"></i></div><div class="g"><span>Awaiting refresh</span><span>--</span></div></article></div>
<hr class="d">
<div class="r"><span class="l">Highlighted alternatives</span><article class="c h"><div class="t"><div class="m"><span>Goal progress</span><b>86%</b></div><span class="p">+6 pts</span></div><svg viewBox="0 0 200 96"><path d="M12 69C34 69 38 45 59 45S84 78 106 78s30-60 53-60c12 0 20 9 29 16" stroke="var(--chart-1)" stroke-width="4" stroke-linecap="round" fill="none"/><path d="M12 69h176" stroke="var(--border)" stroke-width="1" stroke-dasharray="4 4"/><circle cx="106" cy="78" r="5" fill="var(--chart-2)"/></svg><div class="g"><span>Target 80%</span><span>Weekly trend</span></div></article><article class="c"><div class="t"><div class="m"><span>Traffic mix</span><b>Q2 channels</b></div><span class="p">Mixed</span></div><div class="o"><div class="n"></div><div class="k"><div class="y"><span><i class="w s1"></i>Search</span><b>44%</b></div><div class="y"><span><i class="w s2"></i>Video</span><b>28%</b></div><div class="y"><span><i class="w s3"></i>Social</span><b>28%</b></div></div></div></article></div>
</body>
</html>
