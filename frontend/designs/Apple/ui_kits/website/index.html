<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../components.css">
<meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Web Kit</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--background-50);
      color: var(--foreground);
      font-family: var(--font-sans);
      font-size: 17px;
      line-height: 1.47059;
      letter-spacing: -0.022em;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .uikit-shell {
      width: 100%;
      max-width: 1184px;
      margin: 0 auto;
      overflow: hidden;
    }
    .uikit-truncate {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .uikit-nowrap {
      white-space: nowrap;
      flex-shrink: 0;
    }
    .uikit-table-wrap {
      max-width: 100%;
      overflow-x: auto;
      overscroll-behavior-x: contain;
    }
    .uikit-responsive-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .uikit-main { min-width: 0; }
    .uikit-toolbar { min-width: 0; }
    .uikit-action-cell {
      max-width: 160px;
      min-width: 0;
    }
    .uikit-action {
      display: inline-flex;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    a { color: var(--brand-600); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ============ Global nav ============ */
    .globalnav {
      position: sticky;
      top: 0;
      z-index: 9999;
      width: 100%;
      height: 44px;
      background: color-mix(in srgb,var(--background-50) 80%,transparent);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid color-mix(in srgb,var(--background-900) 4%,transparent);
    }
    .globalnav-inner {
      max-width: 1024px;
      height: 100%;
      margin: 0 auto;
      padding: 0 22px;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .globalnav-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      height: 100%;
      color: color-mix(in srgb,var(--background-900) 80%,transparent);
    }
    .globalnav-logo svg { width: 14px; height: 44px; }
    .globalnav-list {
      list-style: none;
      margin: 0;
      padding: 0;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
    }
    .globalnav-link {
      display: inline-flex;
      align-items: center;
      height: 100%;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: color-mix(in srgb,var(--background-900) 80%,transparent);
      cursor: pointer;
      background: transparent;
      border: none;
      transition: opacity 180ms ease;
    }
    .globalnav-link:hover { opacity: 0.6; text-decoration: none; }
    .globalnav-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 100%;
      color: color-mix(in srgb,var(--background-900) 80%,transparent);
      cursor: pointer;
      background: transparent;
      border: none;
      transition: opacity 180ms ease;
    }
    .globalnav-icon:hover { opacity: 0.6; }

    /* ============ Common section system ============ */
    .section {
      width: 100%;
      padding: 80px 22px;
    }
    .section.gray { background: var(--muted); }
    .section.dark { background: var(--background-900); color: var(--text-50); }
    .section.dark .eyebrow { color: color-mix(in srgb,var(--background-50) 70%,transparent); }
    .section.dark .copy { color: color-mix(in srgb,var(--background-50) 70%,transparent); }
    .section.dark a { color: var(--brand-400); }
    .container {
      max-width: 980px;
      margin: 0 auto;
    }
    .container-wide {
      max-width: 1440px;
      margin: 0 auto;
    }
    .eyebrow {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.016em;
      color: var(--text-500);
    }
    .display-1 {
      margin: 0;
      font-size: 80px;
      line-height: 1.05;
      letter-spacing: -0.015em;
      font-weight: 600;
      color: inherit;
    }
    .display-2 {
      margin: 0;
      font-size: 56px;
      line-height: 1.07;
      letter-spacing: -0.005em;
      font-weight: 600;
      color: inherit;
    }
    .display-3 {
      margin: 0;
      font-size: 40px;
      line-height: 1.1;
      letter-spacing: 0em;
      font-weight: 600;
      color: inherit;
    }
    .headline {
      margin: 0;
      font-size: 28px;
      line-height: 1.14;
      letter-spacing: 0.007em;
      font-weight: 600;
      color: inherit;
    }
    .copy {
      margin: 16px 0 0;
      font-size: 21px;
      line-height: 1.19;
      letter-spacing: 0.011em;
      font-weight: 400;
      color: var(--text-500);
    }
    .copy-sm {
      margin: 8px 0 0;
      font-size: 17px;
      line-height: 1.47;
      letter-spacing: -0.022em;
      color: var(--text-500);
    }

    /* ============ Buttons ============ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 44px;
      padding: 8px 22px;
      border-radius: 980px;
      font-size: 17px;
      line-height: 1.17645;
      letter-spacing: -0.022em;
      font-weight: 400;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: background-color 180ms ease, color 180ms ease, opacity 180ms ease;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--background-50);
    }
    .btn-primary:hover { background: var(--brand-600); text-decoration: none; }
    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
    }
    .btn-secondary:hover { background: var(--primary); color: var(--background-50); text-decoration: none; }
    .section.dark .btn-secondary {
      color: var(--brand-400);
      border-color: var(--brand-400);
    }
    .section.dark .btn-secondary:hover {
      background: var(--brand-400);
      color: var(--background-50);
    }
    .text-link {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: -0.022em;
      color: var(--brand-600);
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
    }
    .text-link:hover { text-decoration: underline; }
    .text-link .icon { width: 13px; height: 13px; transition: transform 180ms ease; }
    .text-link:hover .icon { transform: translateX(2px); }
    .section.dark .text-link { color: var(--brand-400); }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 22px;
      margin-top: 24px;
    }
    .cta-row.center { justify-content: center; }

    /* ============ Hero billboard ============ */
    .hero {
      width: 100%;
      padding: 64px 22px 56px;
      text-align: center;
      background: var(--background-900);
      color: var(--text-50);
    }
    .hero .eyebrow { color: color-mix(in srgb,var(--background-50) 70%,transparent); }
    .hero .copy { color: color-mix(in srgb,var(--background-50) 85%,transparent); }
    .hero-visual {
      margin: 48px auto 0;
      width: 100%;
      max-width: 920px;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      background:
        radial-gradient(60% 80% at 50% 30%, color-mix(in srgb,var(--brand-500) 45%,transparent), transparent 60%),
        radial-gradient(80% 100% at 50% 100%, color-mix(in srgb,var(--background-50) 5%,transparent), transparent 60%),
        var(--background-900);
      display: grid;
      place-items: center;
      color: var(--background-50);
      border: 1px solid color-mix(in srgb,var(--background-50) 6%,transparent);
      overflow: hidden;
    }
    .hero-visual .icon { width: 96px; height: 96px; opacity: 0.95; }

    /* ============ Bento grid ============ */
    .bento {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .bento-card {
      position: relative;
      padding: 56px 40px;
      border-radius: 18px;
      min-height: 580px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      overflow: hidden;
      isolation: isolate;
    }
    .bento-card.gray { background: var(--muted); color: var(--foreground); }
    .bento-card.white { background: var(--background-50); color: var(--foreground); border: 1px solid var(--border); }
    .bento-card.dark { background: var(--background-900); color: var(--text-50); }
    .bento-card.dark .copy,
    .bento-card.dark .eyebrow { color: color-mix(in srgb,var(--background-50) 70%,transparent); }
    .bento-card.span-2 { grid-column: span 2; }
    .bento-card .display-3,
    .bento-card .headline {
      max-width: 18ch;
    }
    .bento-card .cta-row {
      margin-top: auto;
    }
    .bento-card .product-art {
      width: 100%;
      flex: 1;
      min-height: 200px;
      display: grid;
      place-items: center;
      color: inherit;
    }
    .bento-card .product-art .icon {
      width: 120px;
      height: 120px;
      opacity: 0.92;
      stroke-width: 1;
    }
    .bento-card.dark .product-art {
      background: radial-gradient(70% 60% at 50% 60%, color-mix(in srgb,var(--brand-500) 32%,transparent), transparent 65%);
    }
    .bento-card.gray .product-art {
      background: radial-gradient(70% 60% at 50% 60%, color-mix(in srgb,var(--brand-600) 8%,transparent), transparent 65%);
    }

    /* ============ Feature stripe ============ */
    .feature-stripe {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border-radius: 18px;
      overflow: hidden;
      background: var(--background-50);
      border: 1px solid var(--border);
    }
    .feature-cell {
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-right: 1px solid var(--border);
    }
    .feature-cell:last-child { border-right: none; }
    .feature-cell .icon { width: 40px; height: 40px; color: var(--foreground); stroke-width: 1.4; }
    .feature-cell h3 {
      margin: 8px 0 0;
      font-size: 19px;
      line-height: 1.2;
      letter-spacing: 0.012em;
      font-weight: 600;
    }
    .feature-cell p {
      margin: 0;
      font-size: 14px;
      line-height: 1.43;
      color: var(--text-500);
      letter-spacing: -0.016em;
    }

    /* ============ Quick links ============ */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .quick-card {
      padding: 22px;
      border-radius: 16px;
      background: var(--background-50);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
      text-align: left;
      color: inherit;
    }
    .quick-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -16px color-mix(in srgb,var(--background-900) 18%,transparent);
    }
    .quick-card .icon {
      width: 28px;
      height: 28px;
      color: var(--foreground);
      stroke-width: 1.5;
    }
    .quick-card h4 {
      margin: 4px 0 0;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.022em;
    }
    .quick-card p {
      margin: 0;
      font-size: 13px;
      color: var(--text-500);
      letter-spacing: -0.016em;
    }

    /* ============ Promo strip ============ */
    .promo-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .promo-card {
      padding: 32px 28px;
      border-radius: 16px;
      background: var(--background-50);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .promo-card .promo-icon {
      width: 36px;
      height: 36px;
      color: var(--primary);
      stroke-width: 1.4;
    }
    .promo-card h4 {
      margin: 4px 0 0;
      font-size: 19px;
      letter-spacing: 0.012em;
      font-weight: 600;
    }
    .promo-card p {
      margin: 0;
      font-size: 14px;
      line-height: 1.43;
      color: var(--text-500);
      letter-spacing: -0.016em;
    }

    /* ============ Footer ============ */
    .footer {
      background: var(--muted);
      color: var(--text-500);
      font-size: 12px;
      line-height: 1.33;
      letter-spacing: -0.01em;
      padding: 18px 22px 22px;
    }
    .footer-inner {
      max-width: 1024px;
      margin: 0 auto;
    }
    .footer-disclaimer {
      padding: 18px 0;
      border-bottom: 1px solid color-mix(in srgb,var(--background-900) 10%,transparent);
    }
    .footer-disclaimer p {
      margin: 0 0 8px;
      font-size: 12px;
      line-height: 1.33;
    }
    .footer-disclaimer p:last-child { margin: 0; }
    .footer-columns {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 24px;
      padding: 30px 0;
      border-bottom: 1px solid color-mix(in srgb,var(--background-900) 10%,transparent);
    }
    .footer-col h5 {
      margin: 0 0 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--foreground);
      letter-spacing: -0.01em;
    }
    .footer-col ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .footer-col a {
      color: var(--text-500);
      font-size: 12px;
      line-height: 1.33;
    }
    .footer-col a:hover {
      text-decoration: underline;
      color: var(--foreground);
    }
    .footer-bottom {
      padding: 18px 0 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 16px;
      justify-content: space-between;
    }
    .footer-bottom-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0 16px;
    }
    .footer-bottom-links span {
      position: relative;
      padding-right: 16px;
    }
    .footer-bottom-links span:not(:last-child)::after {
      content: "";
      position: absolute;
      right: 0;
      top: 4px;
      bottom: 4px;
      width: 1px;
      background: color-mix(in srgb,var(--background-900) 18%,transparent);
    }

    /* ============ Kit chrome ============ */
    .kit-caption {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-500);
      padding: 24px 22px 0;
      max-width: 1024px;
      margin: 0 auto;
    }

    /* ============ Responsive ============ */
    @media (max-width: 832px) {
      .display-1 { font-size: 56px; }
      .display-2 { font-size: 40px; }
      .display-3 { font-size: 32px; }
      .bento { grid-template-columns: 1fr; }
      .bento-card.span-2 { grid-column: span 1; }
      .bento-card { padding: 40px 28px; min-height: 460px; }
      .feature-stripe { grid-template-columns: 1fr; }
      .feature-cell { border-right: none; border-bottom: 1px solid var(--border); }
      .feature-cell:last-child { border-bottom: none; }
      .quick-links { grid-template-columns: repeat(2, 1fr); }
      .promo-strip { grid-template-columns: 1fr; }
      .footer-columns { grid-template-columns: repeat(2, 1fr); }
      .globalnav-list { gap: 4px; overflow-x: auto; }
      .globalnav-link { padding: 0 8px; font-size: 11px; flex-shrink: 0; }
    }
    @media (max-width: 900px) {
      .uikit-responsive-grid { grid-template-columns: minmax(0, 1fr); }
      .uikit-table-wrap { overflow-x: auto; }
    }
    @media (max-width: 640px) {
      .uikit-shell { max-width: 100%; }
      .uikit-nowrap { white-space: nowrap; }
      .uikit-action-cell { max-width: 100%; }
    }
    @media (max-width: 480px) {
      .section { padding: 56px 16px; }
      .display-1 { font-size: 44px; }
      .display-2 { font-size: 32px; }
      .display-3 { font-size: 26px; }
      .copy { font-size: 17px; }
    }
    .icon { display: inline-block; flex-shrink: 0; }
  </style>

<style id="uikit-compat-layout-guard">
.uikit-shell { width: 100%; max-width: 1184px; margin: 0 auto; overflow: hidden; }

.uikit-nowrap { white-space: nowrap; flex-shrink: 0; }
.uikit-table-wrap { max-width: 100%; overflow-x: auto; overscroll-behavior-x: contain; }
.uikit-responsive-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(0, 1fr)); gap: 16px; }
.uikit-main { min-width: 0; }
.uikit-toolbar { min-width: 0; }
.uikit-action-cell { max-width: 160px; }
.uikit-action { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
@media (max-width: 900px) { .uikit-responsive-grid { grid-template-columns: minmax(0, 1fr); } }
@media (max-width: 640px) { .uikit-shell { max-width: 100%; } .uikit-responsive-grid { grid-template-columns: minmax(0, 1fr); } }
</style>
</head>
