<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Badge Preview - Claude Design System</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  /* Page scaffold — NOT extracted */
  /* @component-css-start */
*{box-sizing:border-box}
body{margin:0;min-height:100vh;padding:clamp(20px,3vw,32px);background:var(--background);color:var(--foreground);font-family:var(--font-serif)}
.preview{width:min(100%,760px);margin:0 auto;display:grid;gap:clamp(24px,4vw,32px)}
.section{display:grid;gap:14px}
.label{display:block;font:600 10px/1.2 var(--font-serif);letter-spacing:.14em;text-transform:uppercase;color:var(--muted-foreground)}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:clamp(18px,3vw,24px);border:1px solid var(--border);border-radius:calc(var(--radius) + 4px);background:var(--popover);box-shadow:var(--shadow-xs)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-height:32px;padding:0 calc(var(--spacing)*3.5);border-radius:var(--radius);font:600 12px/1 var(--font-sans);letter-spacing:.01em;white-space:nowrap;transition:transform .16s ease,box-shadow .16s ease,background-color .16s ease,color .16s ease,border-color .16s ease}
.badge:hover{transform:translateY(-1px)}
.filled{background:var(--primary);color:var(--primary-foreground);border:1px solid transparent;box-shadow:var(--shadow-xs)}
.filled:hover{box-shadow:var(--shadow-sm)}
.muted{background:var(--muted);color:var(--foreground);border:1px solid transparent}
.outline{background:var(--popover);color:var(--foreground);border:1px solid var(--border)}
.is-disabled{pointer-events:none;box-shadow:none}
.filled.is-disabled{background:var(--secondary);color:var(--muted-foreground);border-color:var(--border)}
.muted.is-disabled{background:var(--card);color:var(--muted-foreground);border-color:transparent}
.outline.is-disabled{background:var(--background);color:var(--muted-foreground)}
@media (max-width:560px){
  .row{padding:18px}
}
  /* @component-css-end */
</style>
</head>
<body>
<main class="preview">
<section class="section">
<span class="label">Filled</span>
<div class="row">
<span class="badge filled">Essay</span>
<span class="badge filled">Editorial</span>
<span class="badge filled is-disabled" aria-disabled="true">Essay</span>
</div>
</section>
<section class="section">
<span class="label">Muted</span>
<div class="row">
<span class="badge muted">Editorial</span>
<span class="badge muted is-disabled" aria-disabled="true">Essay</span>
</div>
</section>
<section class="section">
<span class="label">Outline</span>
<div class="row">
<span class="badge outline">Essay</span>
<span class="badge outline">Editorial</span>
<span class="badge outline is-disabled" aria-disabled="true">Editorial</span>
</div>
</section>
</main>
</body>
</html>
