      align-items: end;
      height: 132px;
      margin-top: calc(var(--spacing) * 3);
    }
    .bar {
      border-radius: calc(var(--radius) * 0.6) calc(var(--radius) * 0.6) 0 0;

    .barLilac { background: var(--border); }
    .barWarm { background: var(--secondary); }
    .barH28 { height: 28px; }
    .barH40 { height: 40px; }
    .barH56 { height: 56px; }
    .barH68 { height: 68px; }
    .barH80 { height: 80px; }
    .barH92 { height: 92px; }
    .barH104 { height: 104px; }
    .barH116 { height: 116px; }
    .chart-labels {

      grid-template-columns: repeat(8, 1fr);

      margin-top: calc(var(--spacing) * 2);

      text-align: center;
      font-family: var(--font-mono);
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: calc(var(--spacing) * 1);
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      gap: calc(var(--spacing) * 3);
      padding: calc(var(--spacing) * 3.5) 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
      min-width: 0;
    }
    .list-item:last-child { border-bottom: none; padding-bottom: 0; }

    .list-copy {

    .list-copy strong,

    .list-trailing {
      display: flex;
      justify-content: flex-end;
      flex-shrink: 0;
      min-width: 0;
    }
    .progress-shell {

    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: var(--radius-full);

    .progress32 { width: 32%; }
    .progress56 { width: 56%; }
    .progress72 { width: 72%; }

    .option {

      align-items: flex-start;
